name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # SEGURIDAD: con pull_request_target los secrets SÍ están disponibles en PRs
    # desde forks, pero también se ejecuta código no confiable. Este allowlist
    # se evalúa ANTES de cualquier checkout: si el autor no está autorizado, el
    # job se saltea entero y el código del fork nunca toca el runner con secrets.
    if: >
      contains(
        fromJSON('["JoseDavidGarciaDowning", "GeraldFPA", "Mfce3012", "VictorRodz"]'),
        github.event.pull_request.user.login
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout PR head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # pull_request_target hace checkout de la rama base por defecto.
          # Fijamos el SHA exacto del head del PR (no el ref) para que Claude
          # revise el código real del PR y para evitar una condición de carrera
          # donde se empujen commits nuevos después de pasar el allowlist.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@70a6e5256e9e2366a1ed5c041904a982ba3a328f  # v1.0.135
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Read CLAUDE.md from this repository. Every rule in the "Reglas duras" table is NON-NEGOTIABLE.

            ## Severity levels

            - **BLOCKING**: Any violation of the hard rules (innerHTML/outerHTML/insertAdjacentHTML usage, no Shadow DOM, CSS not using adoptedStyleSheets, component without hyphen, etc.). Do NOT approve if any BLOCKING issue exists.
            - **WARNING**: Lifecycle misuse (logic in constructor that belongs in connectedCallback), missing disconnectedCallback cleanup, CustomEvents without bubbles/composed, wrong property vs attribute usage.
            - **SUGGESTION**: Minor style improvements, naming clarity, code organization.

            ## For each issue found

            1. Severity label: `[BLOCKING]`, `[WARNING]`, or `[SUGGESTION]`
            2. File and line number
            3. The exact problematic code (quoted)
            4. Why it violates the rule
            5. The corrected version using the pattern from CLAUDE.md

            ## Folder structure check

            Verify that new components follow the structure defined in CLAUDE.md:
            `src/components/ComponentName/ComponentName.js` + `ComponentName.css`

            If the structure is wrong, flag it as `[WARNING]`.

            ## Final verdict

            End your review with one of:
            - ✅ **APPROVED** — no blocking issues found
            - ❌ **CHANGES REQUIRED** — list all blocking issues that must be fixed before merge

