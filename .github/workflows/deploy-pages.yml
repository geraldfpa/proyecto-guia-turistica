name: Deploy to GitHub Pages

# Despliega el sitio estático a GitHub Pages automáticamente en cada push a main.
# Corre en un runner Linux, así que toma los archivos con el caso EXACTO de git
# (evita el bug de mayúsculas/minúsculas que aparece al deployar desde una Mac).
on:
  push:
    branches: [main]
  workflow_dispatch: # permite disparar el deploy a mano desde la pestaña Actions

# Permisos mínimos: pages:write + id-token:write son los que necesita el deploy
# oficial de Pages para mintear su token OIDC y publicar.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez. No cancela el que está en curso (deja terminar).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configurar Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # El sitio es estático y vive en la raíz del repo (index.html + src/ + assets/),
      # sin paso de build. Subimos la raíz tal cual como artefacto.
      - name: Subir artefacto del sitio
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "."

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
